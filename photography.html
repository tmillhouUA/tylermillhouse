<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photography | Tyler Millhouse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <script src="nav.js"></script>

  <main>
    <div class="container">
      <div class="page-header">
        <h1>Photography</h1>
        <p>Images from my time under the stars and behind the viewfinder.</p>
      </div>

      <div class="coming-soon-wrap">
        <div class="coming-soon-overlay" style="align-items: flex-start; padding-top: 11rem;"><span>Coming Soon...</span></div>

      <!-- ── Astronomy ───────────────────────────────────────── -->
      <section class="photo-section">
        <h2 class="section-title">Astronomy</h2>
        <div class="photo-grid">

          <figure class="photo-item">
            <img src="images/photography/astronomy/milky-way.jpg" alt="Milky Way" loading="lazy" />
            <figcaption class="photo-caption">Milky Way core rising over the Sonoran Desert, Tucson, AZ</figcaption>
          </figure>

          <figure class="photo-item">
            <img src="images/photography/astronomy/andromeda.jpg" alt="Andromeda Galaxy" loading="lazy" />
            <figcaption class="photo-caption">Andromeda Galaxy (M31) — 2.5 million light years from home</figcaption>
          </figure>

          <figure class="photo-item">
            <img src="images/photography/astronomy/orion-nebula.jpg" alt="Orion Nebula" loading="lazy" />
            <figcaption class="photo-caption">Orion Nebula (M42) — a stellar nursery 1,344 light years away</figcaption>
          </figure>

          <figure class="photo-item">
            <img src="images/photography/astronomy/lunar-eclipse.jpg" alt="Lunar Eclipse" loading="lazy" />
            <figcaption class="photo-caption">Total lunar eclipse, November 2022</figcaption>
          </figure>

          <figure class="photo-item">
            <img src="images/photography/astronomy/saturn.jpg" alt="Saturn" loading="lazy" />
            <figcaption class="photo-caption">Saturn and its rings through an 8&quot; Dobsonian reflector</figcaption>
          </figure>

          <figure class="photo-item">
            <img src="images/photography/astronomy/pleiades.jpg" alt="Pleiades" loading="lazy" />
            <figcaption class="photo-caption">The Pleiades (M45) with surrounding nebulosity</figcaption>
          </figure>

        </div>
      </section>

      <!-- ── General ────────────────────────────────────────── -->
      <section class="photo-section">
        <h2 class="section-title">General</h2>
        <div class="photo-grid">

          <figure class="photo-item">
            <img src="images/photography/general/desert-monsoon.jpg" alt="Desert Monsoon" loading="lazy" />
            <figcaption class="photo-caption">Lightning over the Rincon Mountains during monsoon season</figcaption>
          </figure>

          <figure class="photo-item">
            <img src="images/photography/general/saguaro-sunset.jpg" alt="Saguaro Sunset" loading="lazy" />
            <figcaption class="photo-caption">Saguaro silhouettes at dusk, Saguaro National Park</figcaption>
          </figure>

          <figure class="photo-item">
            <img src="images/photography/general/canyon-light.jpg" alt="Canyon Light" loading="lazy" />
            <figcaption class="photo-caption">Sandstone glow, slot canyon near Page, AZ</figcaption>
          </figure>

          <figure class="photo-item">
            <img src="images/photography/general/hummingbird.jpg" alt="Hummingbird" loading="lazy" />
            <figcaption class="photo-caption">Broad-tailed hummingbird, Santa Catalina Mountains</figcaption>
          </figure>

          <figure class="photo-item">
            <img src="images/photography/general/barrio-viejo.jpg" alt="Barrio Viejo" loading="lazy" />
            <figcaption class="photo-caption">Barrio Viejo at golden hour, Tucson, AZ</figcaption>
          </figure>

          <figure class="photo-item">
            <img src="images/photography/general/ice-crystals.jpg" alt="Ice Crystals" loading="lazy" />
            <figcaption class="photo-caption">Ice crystal formation on a winter morning in Flagstaff, AZ</figcaption>
          </figure>

        </div>
      </section>

      </div> <!-- end coming-soon-wrap -->
    </div>
  </main>
</body>
</html>
